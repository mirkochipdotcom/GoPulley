<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoPulley — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
</head>

<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <rect width="36" height="36" rx="10" fill="url(#grad)" />
          <path d="M10 18L16 24L26 12" stroke="white" stroke-width="2.5" stroke-linecap="round"
            stroke-linejoin="round" />
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="36" y2="36">
              <stop offset="0%" stop-color="#6366f1" />
              <stop offset="100%" stop-color="#8b5cf6" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <span class="logo-text">GoPulley</span>
    </div>

    <h1 class="auth-title">Bentornato</h1>
    <p class="auth-subtitle">Accedi con le credenziali aziendali{{if .MockMode}} <span class="badge-dev">DEV
        MODE</span>{{end}}</p>

    <form hx-post="/login" hx-target="#login-error" hx-swap="outerHTML" hx-indicator="#spinner" class="auth-form">

      <div class="field-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" placeholder="nome.cognome" required
          autofocus />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••"
          required />
      </div>

      <p id="login-error" class="error-msg" aria-live="polite"></p>

      <button type="submit" class="btn btn-primary btn-full">
        <span id="spinner" class="htmx-indicator spinner-ring"></span>
        Accedi
      </button>
    </form>
  </div>

  <script src="/static/js/htmx.min.js"></script>
</body>

</html>
