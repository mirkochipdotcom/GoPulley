<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoPulley — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
</head>

<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">
      <img src="/static/img/logo.svg" alt="GoPulley Logo" class="logo-image">
    </div>
    <span class="logo-text">GoPulley</span>
  </div>

  <h1 class="auth-title">Bentornato</h1>
  <p class="auth-subtitle">Accedi con le credenziali aziendali{{if .MockMode}} <span class="badge-dev">DEV
      MODE</span>{{end}}</p>

  <form hx-post="/login" hx-target="#login-error" hx-swap="outerHTML" hx-indicator="#spinner" class="auth-form">

    <div class="field-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" placeholder="nome.cognome" required
        autofocus />
    </div>

    <div class="field-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••"
        required />
    </div>

    <p id="login-error" class="error-msg" aria-live="polite"></p>

    <button type="submit" class="btn btn-primary btn-full">
      <span id="spinner" class="htmx-indicator spinner-ring"></span>
      Accedi
    </button>
  </form>
  </div>

  <div class="version-tag">
    <span>v{{.Version}}</span>
  </div>

  <script src="/static/js/htmx.min.js"></script>
</body>

</html>
