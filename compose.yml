# GoPulley — Podman / Docker Compose
# Utilizzo:
#   1. cp .env.example .env
#   2. Adatta .env al tuo ambiente
#   3. podman compose up -d   (oppure: docker compose up -d)
#
# L'immagine viene scaricata automaticamente da ghcr.io.
# Per compilare dal sorgente: podman compose up -d --build

services:
  gopulley:
    image: ghcr.io/mirkochipdotcom/gopulley:latest
    container_name: gopulley
    restart: unless-stopped
    ports:
      - "8080:8080"   # porta pubblica (download)
      - "8081:8081"   # porta admin (dashboard/login) — limitare accesso via firewall/VPN
    env_file:
      - .env
    volumes:
      # DATA_DIR definito in .env — default ./data accanto a compose.yml
      - ${DATA_DIR:-./data}:/data
